name: "Build and Release Repair Tool"

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Files Presence
        shell: pwsh
        run: |
          # Correction : On vérifie les fichiers EXACTS de ton projet
          $files = @("Windows-Tool.vbs", "bin/menu.bat", "bin/repair.bat", "bin/analyze.bat", "bin/all.bat")
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { 
                Write-Error "ERREUR : Fichier manquant dans le dépôt : $f"
                exit 1 
            }
          }
          Write-Host "Tous les fichiers critiques sont présents."

      - name: Create Archive
        shell: pwsh
        run: |
          # 1. Définition du dossier final
          $ReleaseFolder = "RepairTool_${{ github.ref_name }}"
          
          # 2. Création de la structure
          New-Item -ItemType Directory -Path "$ReleaseFolder"
          
          # 3. Copie des fichiers dans ce dossier spécifique
          Copy-Item "Windows-Tool.vbs" -Destination "$ReleaseFolder/"
          Copy-Item -Path "bin" -Destination "$ReleaseFolder/bin" -Recurse
          
          # 4. Nettoyage des fichiers temporaires
          Remove-Item -Path "$ReleaseFolder/bin/*.tmp" -ErrorAction SilentlyContinue
          
          # 5. COMPRESSION DU DOSSIER (On enlève le /* pour que le dossier soit inclus)
          $ZipName = "RepairTool_${{ github.ref_name }}.zip"
          Compress-Archive -Path "$ReleaseFolder" -DestinationPath "$ZipName"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "RepairTool_*.zip"
          name: "Repair Tool ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}