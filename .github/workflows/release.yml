name: "Build and Release Repair Tool"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Files Presence
        shell: pwsh
        run: |
          # Correction : On vérifie les fichiers EXACTS de ton projet
          $files = @("Windows-Tool.vbs", "bin/menu.bat", "bin/repair.bat", "bin/analyze.bat", "bin/all.bat")
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { 
                Write-Error "ERREUR : Fichier manquant dans le dépôt : $f"
                exit 1 
            }
          }
          Write-Host "Tous les fichiers critiques sont présents."

      - name: Create Archive
        shell: pwsh
        run: |
          # 1. Création d'un dossier temporaire pour packager proprement
          New-Item -ItemType Directory -Path "RepairTool_Package"
          
          # 2. Copie du lanceur et du dossier bin
          Copy-Item "Windows-Tool.vbs" -Destination "RepairTool_Package/"
          Copy-Item -Path "bin" -Destination "RepairTool_Package/bin" -Recurse
          
          # 3. Suppression des fichiers temporaires de log s'ils existent (nettoyage avant zip)
          Remove-Item -Path "RepairTool_Package/bin/*.tmp" -ErrorAction SilentlyContinue
          
          # 4. Compression du contenu du dossier
          # Note : On zippe le CONTENU pour que l'utilisateur n'ait pas de sous-dossier inutile
          Compress-Archive -Path "RepairTool_Package/*" -DestinationPath "RepairTool_${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "RepairTool_*.zip"
          name: "Repair Tool ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}